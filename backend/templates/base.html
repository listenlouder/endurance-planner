<!DOCTYPE html>
<html lang="en"
      x-data="{
        dark: localStorage.getItem('darkMode') === 'true' || (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)
      }"
      x-init="$watch('dark', val => localStorage.setItem('darkMode', val))"
      :class="{ 'dark': dark }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}WeAreChecking{% endblock %}</title>

  {% load static %}
  <!-- Compiled Tailwind CSS -->
  <link rel="stylesheet" href="{% static 'css/output.css' %}">

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
  <style>[x-cloak] { display: none !important; }</style>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>

</head>
<body class="min-h-screen transition-colors duration-200">

  <!-- Navigation bar -->
  <nav class="flex items-center justify-between px-6 py-3 shadow-sm"
       style="background-color: var(--color-nav-bg); border-bottom: 2px solid var(--color-accent1);">

    <a href="{% url 'home' %}"
       class="font-bold hover:opacity-80 transition-opacity"
       style="color: var(--color-accent1); font-size: 1.25rem; letter-spacing: -0.02em;">
      WeAreChecking
    </a>

    <!-- Dark mode toggle -->
    <button @click="dark = !dark"
            class="rounded-full p-2 focus:outline-none focus:ring-2 transition-colors duration-150"
            style="border: 1px solid var(--color-accent2); color: var(--color-accent2);"
            :aria-label="dark ? 'Switch to light mode' : 'Switch to dark mode'">
      <!-- Sun icon (show in dark mode) -->
      <svg x-show="dark" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
      </svg>
      <!-- Moon icon (show in light mode) -->
      <svg x-show="!dark" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
      </svg>
    </button>
  </nav>

  <!-- Main content -->
  <main class="px-6 py-8 max-w-7xl mx-auto">
    {% block content %}{% endblock %}
  </main>

  <script>
    function timezonePicker(initialTz) {
      return {
        selected: initialTz || 'UTC',
        open: false,
        groups: [],

        init() {
          this.groups = typeof timezoneList !== 'undefined' ? timezoneList : [];
        },

        get selectedLabel() {
          for (const group of this.groups) {
            const match = group.zones.find(z => z.value === this.selected);
            if (match) return match.label;
          }
          return this.selected;
        },

        select(value) {
          this.selected = value;
          this.open = false;
          this.$dispatch('timezone-selected', { value: value });
        },

        closeDropdown() {
          this.open = false;
        },
      };
    }
  </script>

  {% block extra_js %}{% endblock %}

  <!-- Feedback widget -->
  <div x-data="{
      open: false,
      submitted: false,
      text: '',
      currentUrl: window.location.href,
      userAgent: navigator.userAgent
  }"
       @feedback-success.window="submitted = true"
       x-cloak>

    <!-- Trigger button — fixed bottom right -->
    <button @click="open = true; submitted = false; text = ''"
            x-show="!open"
            class="fixed bottom-6 right-6 z-40 w-12 h-12
                   rounded-full shadow-lg flex items-center
                   justify-center transition hover:opacity-80
                   focus:outline-none"
            style="background-color: var(--color-accent1);"
            title="Send feedback">
      <svg xmlns="http://www.w3.org/2000/svg"
           class="w-5 h-5" fill="none"
           viewBox="0 0 24 24" stroke="white" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0
                 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0
                 01-2 2h-5l-3 3v-3z"/>
      </svg>
    </button>

    <!-- Modal overlay -->
    <div x-show="open"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click.self="open = false; submitted = false; text = ''"
         class="fixed inset-0 z-50 flex items-center justify-center
                p-6 bg-black bg-opacity-40">

      <!-- Modal panel -->
      <div x-show="open"
           x-transition:enter="transition ease-out duration-200"
           x-transition:enter-start="opacity-0 translate-y-4"
           x-transition:enter-end="opacity-100 translate-y-0"
           x-transition:leave="transition ease-in duration-150"
           x-transition:leave-start="opacity-100 translate-y-0"
           x-transition:leave-end="opacity-0 translate-y-4"
           class="w-full max-w-lg rounded-xl shadow-xl p-6"
           style="background-color: var(--color-nav-bg);
                  border: 1px solid var(--color-border);">

        <!-- Header -->
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-bold"
              style="color: var(--color-accent1);">
            Send Feedback
          </h3>
          <button @click="open = false; submitted = false; text = ''"
                  class="opacity-40 hover:opacity-100 transition"
                  aria-label="Close">
            <svg class="w-4 h-4" fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <!-- Form (hidden after submission) -->
        <form x-show="!submitted"
              hx-post="{% url 'feedback_submit' %}"
              hx-target="#feedback-errors"
              hx-swap="innerHTML">
          {% csrf_token %}

          <!-- Hidden context fields -->
          <input type="hidden"
                 name="page_url"
                 :value="currentUrl">
          <input type="hidden"
                 name="user_agent"
                 :value="userAgent">

          <textarea name="text"
                    x-model="text"
                    placeholder="Report a bug, suggest an
improvement, or share any thoughts…"
                    rows="7"
                    maxlength="1000"
                    class="w-full px-3 py-2 rounded-lg border-2
                           text-sm resize-none focus:outline-none
                           transition"
                    style="background-color: var(--color-base);
                           color: var(--color-text);
                           border-color: var(--color-border);">
          </textarea>

          <!-- Character count -->
          <p class="text-xs opacity-30 text-right mt-1">
            <span x-text="text.length"></span>/1000
          </p>

          <div id="feedback-errors"></div>

          <button type="submit"
                  :disabled="!text.trim()"
                  :class="!text.trim()
                    ? 'opacity-40 cursor-not-allowed'
                    : 'hover:opacity-80'"
                  class="w-full mt-2 py-2 rounded-lg text-sm
                         font-semibold transition"
                  style="background-color: var(--color-accent1);
                         color: #fff;">
            Submit Feedback
          </button>
        </form>

        <!-- Success message (shown after submission) -->
        <div x-show="submitted" class="text-center py-4">
          <p class="text-sm font-medium"
             style="color: var(--color-accent2);">
            ✓ Thanks for your feedback!
          </p>
          <p class="text-xs opacity-50 mt-1">
            Your message has been recorded.
          </p>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
