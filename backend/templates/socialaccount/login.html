{% extends 'base.html' %}
{% load static %}
{% block title %}Log In — WeAreChecking{% endblock %}

{% block content %}
<div style="display: flex;
             align-items: center;
             justify-content: center;
             min-height: calc(100vh - 56px);">

  <div style="width: 100%;
               max-width: 360px;
               padding: 0 16px;">

    <div style="background: var(--bg-card);
                 border: 1px solid var(--border);
                 border-top: 2px solid var(--primary);
                 padding: 32px;">

      <div style="display: flex;
                   align-items: center;
                   gap: 10px;
                   margin-bottom: 28px;">
        <svg viewBox="0 0 200 100" fill="none"
             xmlns="http://www.w3.org/2000/svg"
             style="width: 40px; height: 20px; flex-shrink: 0;">
          <text x="2" y="88"
                font-family="Rajdhani, sans-serif"
                font-weight="700" font-size="90"
                fill="var(--primary)"
                letter-spacing="-4">W</text>
          <text x="76" y="88"
                font-family="Rajdhani, sans-serif"
                font-weight="700" font-size="90"
                fill="var(--text)"
                letter-spacing="-4">A</text>
          <path d="M194,8 A36,42 0 1,0 194,94"
                stroke="var(--secondary)"
                stroke-width="10" fill="none"
                stroke-linecap="round"/>
          <polyline points="160,58 170,72 190,46"
                    stroke="var(--secondary)"
                    stroke-width="6" fill="none"
                    stroke-linecap="round"
                    stroke-linejoin="round"/>
        </svg>
        <span style="font-family: 'Rajdhani', sans-serif;
                      font-size: 15px;
                      font-weight: 700;
                      letter-spacing: 0.04em;
                      text-transform: uppercase;
                      color: var(--text);">
          WeAreChecking
        </span>
      </div>

      <h1 style="font-family: 'Rajdhani', sans-serif;
                  font-size: 22px;
                  font-weight: 700;
                  letter-spacing: 0.04em;
                  text-transform: uppercase;
                  color: var(--text);
                  margin-bottom: 8px;">
        Sign In
      </h1>
      <p style="font-size: 11px;
                 color: var(--text-mid);
                 letter-spacing: 0.04em;
                 line-height: 1.6;
                 margin-bottom: 28px;">
        Log in with Discord to track your events and
        access admin pages without saving links.
      </p>

      <form method="post" action="{% url 'discord_login' %}">
        {% csrf_token %}
        <button type="submit"
                style="width: 100%;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        gap: 10px;
                        padding: 12px 20px;
                        background: #5865F2;
                        color: #fff;
                        font-family: 'DM Mono', monospace;
                        font-size: 11px;
                        font-weight: 500;
                        letter-spacing: 0.1em;
                        text-transform: uppercase;
                        border: none;
                        cursor: pointer;
                        transition: opacity 0.15s;"
                onmouseenter="this.style.opacity='.85'"
                onmouseleave="this.style.opacity='1'">
          <svg width="18" height="14" viewBox="0 0 14 11" fill="white">
            <path d="M11.86 1.021A11.6 11.6 0 0 0 9.004 0a.044.044 0 0 0-.046.022c-.124.222-.262.511-.358.738a10.72 10.72 0 0 0-3.2 0 7.467 7.467 0 0 0-.363-.738.045.045 0 0 0-.046-.022 11.564 11.564 0 0 0-2.856 1.021.041.041 0 0 0-.019.016C.328 3.794-.196 6.494.061 9.161a.048.048 0 0 0 .018.033 11.653 11.653 0 0 0 3.508 1.772.046.046 0 0 0 .05-.016c.27-.369.511-.758.718-1.167a.044.044 0 0 0-.024-.062 7.673 7.673 0 0 1-1.097-.523.045.045 0 0 1-.004-.074c.074-.055.147-.113.217-.171a.043.043 0 0 1 .045-.006c2.302 1.051 4.795 1.051 7.07 0a.043.043 0 0 1 .046.005c.07.059.143.117.217.172a.045.045 0 0 1-.004.074 7.201 7.201 0 0 1-1.097.522.045.045 0 0 0-.024.063c.211.409.452.797.717 1.166a.045.045 0 0 0 .05.017 11.618 11.618 0 0 0 3.514-1.772.046.046 0 0 0 .018-.032c.292-3.026-.49-5.703-2.073-8.054a.036.036 0 0 0-.019-.017zM4.677 7.522c-.69 0-1.258-.634-1.258-1.41 0-.777.557-1.411 1.258-1.411.707 0 1.269.639 1.258 1.41 0 .777-.557 1.411-1.258 1.411zm4.652 0c-.69 0-1.258-.634-1.258-1.41 0-.777.557-1.411 1.258-1.411.707 0 1.269.639 1.258 1.41 0 .777-.551 1.411-1.258 1.411z"/>
          </svg>
          Continue with Discord
        </button>
      </form>

      <div style="margin-top: 20px; text-align: center;">
        <a href="{% url 'home' %}"
           style="font-size: 10px;
                   color: var(--text-dim);
                   letter-spacing: 0.08em;
                   text-decoration: none;
                   transition: color 0.15s;"
           onmouseenter="this.style.color='var(--text)'"
           onmouseleave="this.style.color='var(--text-dim)'">
          ← Back to home
        </a>
      </div>

    </div>
  </div>
</div>
{% endblock %}
