{% extends "base.html" %}

{% block title %}{{ event.name }} Signup — WeAreChecking{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">

  <a href="{% url 'home' %}"
     class="inline-flex items-center gap-1 text-sm mb-6 opacity-60 hover:opacity-100 transition"
     style="color: var(--color-text);">← Back to Home</a>

  <h1 class="text-3xl font-bold mb-1" style="color: var(--color-accent1);">
    Sign Up
  </h1>
  <p class="text-base opacity-70 mb-6">{{ event.name }}</p>

  {% include "partials/signup_form.html" %}

</div>
{% endblock %}

{% block extra_js %}
<script>
  const timezoneList = {{ timezone_list_json|safe }};
  const slotTimestamps = {{ slot_timestamps_json|safe }};
  const browserTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const allValues = timezoneList.flatMap(g => g.zones.map(z => z.value));
  const detectedTz = allValues.includes(browserTz) ? browserTz : 'UTC';

  function signupFormData() {
    return {
      timezone: detectedTz,
      slotTimestamps: slotTimestamps,
      checked: slotTimestamps.map(s => submittedSlots.includes(s)),

      formatTime(utcString) {
        return new Date(utcString).toLocaleTimeString('en-US', {
          timeZone: this.timezone,
          hour: '2-digit',
          minute: '2-digit',
          hour12: true,
        });
      },

      formatDate(utcString) {
        return new Date(utcString).toLocaleDateString('en-US', {
          timeZone: this.timezone,
          weekday: 'short',
          month: 'short',
          day: 'numeric',
        });
      },

      isNewDay(i) {
        if (i === 0) return true;
        const opts = { timeZone: this.timezone, year: 'numeric', month: 'numeric', day: 'numeric' };
        const prev = new Date(this.slotTimestamps[i - 1]).toLocaleDateString('en-US', opts);
        const curr = new Date(this.slotTimestamps[i]).toLocaleDateString('en-US', opts);
        return prev !== curr;
      },

      selectAll() { this.checked = this.checked.map(() => true); },
      clearAll()  { this.checked = this.checked.map(() => false); },
    };
  }
</script>
{% endblock %}
