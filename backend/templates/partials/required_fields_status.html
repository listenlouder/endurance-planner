{% if event.has_required_stint_fields %}
  <div class="flex items-center gap-3 text-green-400 text-sm">
    <span>✓ All required fields for stint calculation are set.</span>
    <a href="{% url 'create_stints' event.id %}"
       class="underline" style="color: var(--secondary);">
      Go to Create Stints →
    </a>
  </div>
{% else %}
  <div class="text-yellow-400 text-sm">
    <p class="mb-2">⚠ The following fields are required before stints can be calculated:</p>
    <ul class="list-disc list-inside space-y-1 opacity-80">
      {% for label in missing_required_fields %}
        <li>{{ label }}</li>
      {% endfor %}
    </ul>
  </div>
{% endif %}
