{% load tz_filters %}
<tr id="driver-row-{{ driver.id }}" class="transition-colors">
  <td>
    {% include 'partials/driver_name_display.html' with driver=driver event=event only %}
  </td>
  <td class="opacity-70 hidden lg:table-cell">{{ driver.timezone }}</td>
  <td class="text-center">{{ driver.stint_count }}</td>
  <td>
    <div class="flex items-center gap-3">
      <a href="{% url 'signup_edit' event.id driver.id %}?from=admin"
         class="text-xs underline"
         style="color: var(--secondary);">
        Edit Availability
      </a>
      <button hx-delete="{% url 'admin_remove_driver' event.id driver.id %}"
              hx-confirm="Remove {{ driver.name }} from this event? This will delete their availability and any assigned stints."
              hx-target="#driver-row-{{ driver.id }}"
              hx-swap="outerHTML"
              hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
              class="text-xs px-2 py-1 rounded border border-red-500 text-red-400 hover:bg-red-500/10 transition-colors">
        Remove
      </button>
    </div>
  </td>
</tr>
