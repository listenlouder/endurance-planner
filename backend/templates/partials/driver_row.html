{% load tz_filters %}
<tr id="driver-row-{{ driver.id }}"
    class="border-b border-white border-opacity-5 hover:bg-white hover:bg-opacity-5 transition-colors">
  <td class="py-2 pr-4 font-medium">{{ driver.name }}</td>
  <td class="py-2 pr-4 opacity-70">{{ driver.timezone }}</td>
  <td class="py-2 pr-4 opacity-70">{{ driver.signed_up_at|to_tz:admin_tz|date:"M j Y, H:i" }}</td>
  <td class="py-2 pr-4 text-center">{{ driver.stint_count }}</td>
  <td class="py-2">
    <div class="flex items-center gap-3">
      <a href="/{{ event.id }}/signup/{{ driver.id }}/edit/"
         class="text-xs underline"
         style="color: var(--color-accent2);">
        Edit Availability
      </a>
      <button hx-delete="{% url 'admin_remove_driver' event.id event.admin_key driver.id %}"
              hx-confirm="Remove {{ driver.name }} from this event? This will delete their availability and any assigned stints."
              hx-target="#driver-row-{{ driver.id }}"
              hx-swap="outerHTML"
              hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
              class="text-xs px-2 py-1 rounded border border-red-500 text-red-400 hover:bg-red-500 hover:bg-opacity-10 transition-colors">
        Remove
      </button>
    </div>
  </td>
</tr>
