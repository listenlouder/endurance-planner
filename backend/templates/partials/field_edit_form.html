<div id="field-{{ field_name }}-display">
  <span class="text-xs font-medium opacity-50">{{ field_label }}</span>
  <form hx-post="{% url 'admin_edit_field' event.id %}"
        hx-target="#field-{{ field_name }}-display"
        hx-swap="outerHTML"
        class="mt-1">
    {% csrf_token %}
    <input type="hidden" name="field" value="{{ field_name }}">

    {% if field_type == 'checkbox' %}
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox"
               name="value"
               value="true"
               {% if current_value %}checked{% endif %}
               class="w-5 h-5 rounded"
               style="accent-color: var(--color-accent1);">
        <span class="text-sm">List as recruiting on home page</span>
      </label>

    {% elif field_type == 'textarea' %}
      <textarea name="value"
                rows="3"
                class="w-full rounded px-2 py-1 text-sm bg-transparent focus:outline-none focus:ring-1"
                style="border: 1px solid var(--color-accent2);">{{ current_value }}</textarea>

    {% elif field_name == 'length_hours' %}
      <div class="flex items-center gap-3"
           x-data
           @input="$event.target.value = $event.target.value.replace(/[^0-9]/g, '')">
        <div class="flex items-center gap-1">
          <input type="number"
                 name="length_hours"
                 value="{{ current_hours }}"
                 min="0" max="168"
                 placeholder="0"
                 autofocus
                 class="w-20 px-2 py-1 rounded border-2 text-sm text-center focus:outline-none"
                 style="background-color: var(--color-base);
                        color: var(--color-text);
                        border-color: var(--color-accent1);">
          <span class="text-xs opacity-60">hrs</span>
        </div>
        <div class="flex items-center gap-1">
          <input type="number"
                 name="length_minutes"
                 value="{{ current_minutes }}"
                 min="0" max="59"
                 placeholder="0"
                 class="w-20 px-2 py-1 rounded border-2 text-sm text-center focus:outline-none"
                 style="background-color: var(--color-base);
                        color: var(--color-text);
                        border-color: var(--color-accent1);">
          <span class="text-xs opacity-60">min</span>
        </div>
      </div>

    {% elif field_type == 'mmss' %}
      <input type="text"
             name="value"
             value="{{ current_value }}"
             placeholder="M:SS"
             pattern="^\d+:[0-5]\d$"
             title="Enter time as M:SS (e.g. 1:45)"
             autofocus
             class="w-full rounded px-2 py-1 text-sm bg-transparent focus:outline-none focus:ring-1"
             style="border: 1px solid var(--color-accent2);">
      <p class="text-xs opacity-50 mt-1">Format: M:SS (e.g. 1:45 for 1 min 45 sec)</p>

    {% else %}
      <input type="{{ field_type }}"
             name="value"
             value="{{ current_value }}"
             step="any"
             {% if field_min %}min="{{ field_min }}"{% endif %}
             {% if field_max %}max="{{ field_max }}"{% endif %}
             autofocus
             class="w-full rounded px-2 py-1 text-sm bg-transparent focus:outline-none focus:ring-1"
             style="border: 1px solid var(--color-accent2);">
    {% endif %}

    {% if error %}
      <p class="text-red-400 text-xs mt-1">{{ error }}</p>
    {% endif %}

    <div class="flex gap-2 mt-2">
      <button type="submit"
              class="px-3 py-1 text-xs rounded font-medium"
              style="background-color: var(--color-accent2); color: #111;">
        Save
      </button>
      <button type="button"
              hx-get="{% url 'admin_edit_field' event.id %}?field={{ field_name }}&cancel=1"
              hx-target="#field-{{ field_name }}-display"
              hx-swap="outerHTML"
              class="px-3 py-1 text-xs rounded"
              style="border: 1px solid var(--color-accent2); color: var(--color-accent2);">
        Cancel
      </button>
    </div>
  </form>
</div>
