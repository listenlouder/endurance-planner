{% load tz_filters %}
{% if drivers %}
  <div class="overflow-x-auto">
    <table class="wac-table">
      <thead>
        <tr>
          <th>Name</th>
          <th class="hidden lg:table-cell">Timezone</th>
          <th class="text-center">Stints</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for driver in drivers %}
          {% include "partials/driver_row.html" with driver=driver event=event admin_tz=admin_tz csrf_token=csrf_token only %}
        {% endfor %}
      </tbody>
    </table>
  </div>
{% else %}
  <p class="text-sm opacity-50">No drivers have signed up yet.</p>
{% endif %}
