{% load tz_filters %}
{% if drivers %}
  <div class="overflow-x-auto">
    <table class="w-full text-sm border-collapse">
      <thead>
        <tr class="text-left border-b border-white/10">
          <th class="py-2 pr-4 font-medium opacity-60">Name</th>
          <th class="py-2 pr-4 font-medium opacity-60 hidden lg:table-cell">Timezone</th>
          <th class="py-2 pr-4 font-medium opacity-60 text-center">Stints</th>
          <th class="py-2 font-medium opacity-60">Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for driver in drivers %}
          {% include "partials/driver_row.html" with driver=driver event=event admin_tz=admin_tz csrf_token=csrf_token only %}
        {% endfor %}
      </tbody>
    </table>
  </div>
{% else %}
  <p class="text-sm opacity-50">No drivers have signed up yet.</p>
{% endif %}
