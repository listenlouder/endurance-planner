<div x-data="{
  tzSearch: '',
  timezone: 'UTC',
  showTzPicker: false,
  dropStyle: {},
  checked: (typeof slotTimestamps !== 'undefined' ? slotTimestamps : []).map(() => false),

  get flatSlots() {
    const ts = typeof slotTimestamps !== 'undefined' ? slotTimestamps : [];
    const result = [];
    let lastDay = '';
    for (let i = 0; i < ts.length; i++) {
      const day = this.formatDate(ts[i]);
      if (day !== lastDay) {
        result.push({ type: 'sep', label: day });
        lastDay = day;
      }
      result.push({ type: 'slot', index: i, ts: ts[i] });
    }
    return result;
  },

  formatTime(utcString) {
    return new Date(utcString).toLocaleTimeString('en-US', {
      timeZone: this.timezone, hour: '2-digit', minute: '2-digit', hour12: false
    });
  },

  formatDate(utcString) {
    return new Date(utcString).toLocaleDateString('en-US', {
      timeZone: this.timezone, weekday: 'short', month: 'short', day: 'numeric'
    });
  },

  get filteredGroups() {
    const list = typeof timezoneList !== 'undefined' ? timezoneList : [];
    if (!this.tzSearch) return list;
    const q = this.tzSearch.toLowerCase();
    return list.map(g => ({
      ...g,
      zones: g.zones.filter(z =>
        z.label.toLowerCase().includes(q) ||
        z.value.toLowerCase().includes(q)
      )
    })).filter(g => g.zones.length > 0);
  },

  openPicker() {
    requestAnimationFrame(() => {
      const r = this.$refs.tzBtn.getBoundingClientRect();
      this.dropStyle = {
        position: 'fixed',
        top: Math.round(r.bottom + 2) + 'px',
        bottom: 'auto',
        left: Math.round(r.left) + 'px',
        width: Math.round(r.width) + 'px',
        zIndex: 9999
      };
      this.showTzPicker = true;
    });
  },

  selectAll()  { this.checked = this.checked.map(() => true); },
  clearAll()   { this.checked = this.checked.map(() => false); },

  resetForm() {
    this.timezone = 'UTC';
    this.showTzPicker = false;
    this.tzSearch = '';
    this.checked = this.checked.map(() => false);
  }
}">

  <form hx-post="{% url 'admin_add_driver' event.id %}"
        hx-target="#driver-list-container"
        hx-swap="innerHTML"
        @htmx:after-request="
          if ($event.detail.successful) {
            resetForm();
            $el.reset();
            $dispatch('close-add-driver');
          }
        "
        hx-on::response-error="
          const errorDiv = document.getElementById('add-driver-errors');
          if (errorDiv) errorDiv.innerHTML = $event.detail.xhr.responseText;
        ">
    {% csrf_token %}

    <div id="add-driver-errors" style="margin-bottom: 8px;"></div>

    <!-- Driver name -->
    <div class="detail-field full-width" style="margin-bottom: 2px;">
      <span class="detail-label">
        Driver name
        <span style="color: var(--primary); margin-left: 2px;">*</span>
      </span>
      <input class="detail-input"
             type="text"
             name="driver_name"
             maxlength="50"
             placeholder="e.g. Will"
             autocomplete="off"
             required>
    </div>

    <!-- Timezone picker -->
    <div class="detail-field full-width" style="margin-bottom: 2px;">
      <span class="detail-label">Timezone</span>
      <input type="hidden" name="timezone" :value="timezone">

      <div @click.outside="showTzPicker = false; tzSearch = ''"
           @scroll.window="showTzPicker = false; tzSearch = ''">
        <!-- Trigger button -->
        <button type="button"
                x-ref="tzBtn"
                @click="showTzPicker ? (showTzPicker = false, tzSearch = '') : openPicker()"
                class="detail-input"
                style="display: flex;
                       align-items: center;
                       justify-content: space-between;
                       cursor: pointer;
                       text-align: left;">
          <span x-text="timezone"
                style="color: var(--text);"></span>
          <span style="font-size: 9px;
                       opacity: 0.5;
                       transition: transform 0.15s;"
                :style="showTzPicker ? 'transform: rotate(180deg)' : ''">↓</span>
        </button>

        <!-- Grouped picker -->
        <div x-show="showTzPicker"
             :style="dropStyle"
             style="border: 1px solid var(--border-mid);
                    background: var(--bg-card);">

          <!-- Search -->
          <div style="padding: 8px; border-bottom: 1px solid var(--border);">
            <input type="text"
                   x-model="tzSearch"
                   x-init="$watch('showTzPicker', v => { if (v) $nextTick(() => $el.focus()) })"
                   placeholder="Search timezones..."
                   class="detail-input"
                   style="width: 100%;"
                   @click.stop>
          </div>

          <!-- Grouped list -->
          <div style="max-height: 200px; overflow-y: auto;">
            <template x-for="group in filteredGroups" :key="group.region">
              <div>
                <div style="padding: 5px 10px;
                            font-size: 9px;
                            letter-spacing: 0.2em;
                            text-transform: uppercase;
                            color: var(--primary);
                            background: var(--bg-raised);
                            border-bottom: 1px solid var(--border);
                            position: sticky;
                            top: 0;"
                     x-text="group.region"></div>
                <template x-for="tz in group.zones" :key="tz.value">
                  <div @click="timezone = tz.value; showTzPicker = false; tzSearch = '';"
                       :style="timezone === tz.value
                         ? 'background: var(--secondary-dim); color: var(--secondary);'
                         : 'color: var(--text-mid);'"
                       style="padding: 7px 14px;
                              font-size: 11px;
                              letter-spacing: 0.03em;
                              cursor: pointer;
                              font-family: 'DM Mono', monospace;
                              transition: background 0.1s;"
                       @mouseenter="if (timezone !== tz.value) $el.style.background = 'var(--bg-raised)'"
                       @mouseleave="$el.style.background = timezone === tz.value ? 'var(--secondary-dim)' : 'transparent'"
                       x-text="tz.label">
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>

    <!-- Availability -->
    <div class="detail-field full-width" style="margin-bottom: 2px;">
      <div style="display: flex;
                  align-items: center;
                  justify-content: space-between;
                  margin-bottom: 10px;">
        <span class="detail-label" style="margin-bottom: 0;">Availability</span>
        <div style="display: flex; gap: 6px;">
          <button type="button"
                  class="btn-ghost"
                  style="padding: 4px 10px; font-size: 10px;"
                  @click="selectAll()">Select all</button>
          <button type="button"
                  class="btn-ghost"
                  style="padding: 4px 10px; font-size: 10px;"
                  @click="clearAll()">Clear all</button>
        </div>
      </div>

      {% if slots %}
      <div class="avail-grid">
        <template x-for="(item, fi) in flatSlots" :key="fi">
          <div style="display: contents;">
            <div x-show="item.type === 'sep'"
                 class="avail-day-label"
                 x-text="item.label"></div>
            <div x-show="item.type === 'slot'"
                 class="avail-slot">
              <input type="checkbox"
                     :id="'add-slot-' + item.index"
                     name="slots"
                     :value="item.ts"
                     x-model="checked[item.index]">
              <label :for="'add-slot-' + item.index">
                <span x-text="formatTime(item.ts)"></span>
                <span class="slot-check">✓</span>
              </label>
            </div>
          </div>
        </template>
      </div>
      {% else %}
      <p style="font-size: 10px;
                color: var(--text-dim);
                letter-spacing: 0.06em;
                padding: 4px 0;">
        No availability slots configured for this event.
      </p>
      {% endif %}
    </div>

    <!-- Actions -->
    <div style="display: flex; gap: 8px; margin-top: 2px;">
      <button type="submit" class="btn-primary">Add Driver</button>
      <button type="button"
              class="btn-ghost"
              @click="$dispatch('close-add-driver')">Cancel</button>
    </div>

  </form>
</div>
